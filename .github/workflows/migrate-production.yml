name: Production Database Migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type MIGRATE to confirm'
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'MIGRATE'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Check migration status (informational only)
        run: |
          echo "📊 Current migration status:"
          npx prisma migrate status || echo "✅ Status check completed (pending migrations found)"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy migrations
        run: |
          echo "🚀 Deploying pending migrations..."
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify completion
        run: |
          echo "✅ Verifying migration completion..."
          npx prisma migrate status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Success notification
        run: echo "🎉 All migrations deployed successfully!"
